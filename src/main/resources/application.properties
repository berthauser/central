# CONFIGURACIÓN BASE COMÚN
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.format-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# NO definir perfil activo aquí - usar VM arguments al ejecutar

# Vistas excluidas del sistema de permisos (no aparecen en PermisosView ni en la tabla)
# Formato: nombres fully qualified separados por coma
app.permissions.excluded-views=com.visus.central.ui.view.DepartamentoView,com.visus.central.ui.view.ProveedoresCrud

